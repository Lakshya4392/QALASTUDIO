name: Update Portfolio Submodule
on:
  push:
    branches: [main]
jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portfolio repo
        uses: actions/checkout@v4
        with:
          repository: Lakshya4392/portfolios
          token: ${{ secrets.PORTFOLIO_PAT }}
          persist-credentials: true
          fetch-depth: 0

      - name: Update submodule pointer
        run: |
          set -x
          git config user.email "bot@antigravity.dev"
          git config user.name "AG Bot"
          git submodule update --init --remote clients/qala-studio
          git add clients/qala-studio
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update qala-studio submodule pointer"
            git push origin main
          fi
