services:
  - type: web
    name: qala-studios-backend
    runtime: node
    buildCommand: npm run render-build
    startCommand: npm start
    plan: free # or starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromConfig: DATABASE_URL
      - key: FRONTEND_URL
        fromConfig: FRONTEND_URL # Add your Vercel URL here after deployment
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ZOHO_EMAIL
        sync: false
      - key: ZOHO_APP_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
