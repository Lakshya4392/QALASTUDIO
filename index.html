
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <title>Qala Studios | Visionary Creative Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              neutral: {
                50: '#FAFAFA',
                100: '#F5F5F5',
                200: '#E5E5E5',
                300: '#D4D4D4',
                400: '#A3A3A3',
                500: '#737373',
                600: '#525252',
                700: '#404040',
                800: '#262626',
                900: '#171717',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Montserrat', 'sans-serif'],
              serif: ['Cormorant Garamond', 'serif'],
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
    <link rel="dns-prefetch" href="https://res.cloudinary.com">
    <link rel="dns-prefetch" href="https://images.unsplash.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600;700;800;900&family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        scroll-behavior: smooth;
        background: #FFFFFF;
        color: #0a0a0a;
        line-height: 1.6;
      }

      /* Typography Classes */
      .font-sans { font-family: 'Inter', sans-serif; }
      .font-display { font-family: 'Montserrat', sans-serif; }
      .font-serif { font-family: 'Cormorant Garamond', serif; }

      .text-hero {
        font-family: 'Montserrat', sans-serif;
        font-weight: 800;
        line-height: 0.95;
        letter-spacing: -0.03em;
        text-transform: uppercase;
      }

      .text-section {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        line-height: 1.1;
        letter-spacing: -0.02em;
        text-transform: uppercase;
      }

      .text-body {
        font-family: 'Inter', sans-serif;
        font-weight: 400;
        line-height: 1.7;
      }

      .text-body-light {
        font-family: 'Inter', sans-serif;
        font-weight: 300;
        line-height: 1.8;
      }

      /* Animations */
      .fade-in {
        opacity: 0;
        transform: translateY(40px);
        transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .fade-in.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }

      @keyframes infinite-scroll {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
      }
      .animate-infinite-scroll {
        animation: infinite-scroll 40s linear infinite;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f8f8f8;
      }
      ::-webkit-scrollbar-thumb {
        background: #000;
        border-radius: 3px;
      }

      /* Consistent spacing utilities */
      .section-spacer { padding: 8rem 0; }
      .section-spacer-lg { padding: 12rem 0; }
      .container-standard {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 2rem;
      }

      @media (min-width: 768px) {
        .container-standard { padding: 0 4rem; }
      }
    </style>
</head>
  <body class="bg-white text-black overflow-x-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
